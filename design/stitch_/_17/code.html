<script>
        // Micro-interactions
        document.querySelectorAll('.ios-segmented-control button').forEach(button => {
            button.addEventListener('click', function() {
                this.parentElement.querySelectorAll('button').forEach(b => {
                    b.classList.remove('active', 'font-bold');
                    b.classList.add('text-on-surface-variant');
                });
                this.classList.add('active', 'font-bold');
                this.classList.remove('text-on-surface-variant');
                
                // Add feedback
                if (window.navigator.vibrate) {
                    window.navigator.vibrate(5);
                }
            });
        });

        // Dark mode toggle simulation (can be linked to OS setting)
        // Check for reduced motion
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        if (!prefersReducedMotion) {
            // Add subtle entry animation for cards
            const observer = new IntersectionObserver((entries) => {
                entries.forEach((entry, index) => {
                    if (entry.isIntersecting) {
                        entry.target.style.opacity = '1';
                        entry.target.style.transform = 'translateY(0)';
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('section, .grid > div').forEach((el, i) => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(20px)';
                el.style.transition = `all 0.6s cubic-bezier(0.22, 1, 0.36, 1) ${i * 0.1}s`;
                observer.observe(el);
            });
        }
    </script>
