            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            font-size: 20px;
        }
        .tabular-nums {
            font-variant-numeric: tabular-nums;
        }
        /* Custom scrollbar for ivory paper feel */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #E3E0D6;
            border-radius: 10px;
        }
        /* Sub-page transition effect */
        .page-enter {
            animation: slideUp 0.4s ease-out forwards;
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .bottom-fade {
            background: linear-gradient(to top, #FAF9F5 0%, rgba(250, 249, 245, 0) 100%);
            pointer-events: none;
        }
    </style>

<body class="bg-background text-on-surface font-body-17 min-h-screen flex flex-col page-enter">

<!-- Contextual Micro-interaction Script -->
<script>
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function(e) {
                if(this.querySelector('.material-symbols-outlined') && this.querySelector('.material-symbols-outlined').innerText === 'add') {
                    // Simple "Add" feedback
                    const originalIcon = this.querySelector('.material-symbols-outlined').innerText;
                    this.querySelector('.material-symbols-outlined').innerText = 'check';
                    this.classList.replace('bg-[#F0E4D5]', 'bg-secondary-container');
                    
                    setTimeout(() => {
                        this.querySelector('.material-symbols-outlined').innerText = 'add';
                        this.classList.replace('bg-secondary-container', 'bg-[#F0E4D5]');
                    }, 800);
                }
            });
        });

        // Pull to refresh mimic or subtle reveal animation
        window.addEventListener('scroll', () => {
            const opacity = Math.min(window.scrollY / 100, 1);
            // Could add header shadow here if needed, but per prompt we keep it flat ivory
        });
    </script>
</body></html>
