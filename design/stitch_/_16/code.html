<body class="antialiased select-none">

<circle cx="130" cy="130" fill="none" r="122" stroke="#E3E0D6" stroke-width="16"></circle>
<circle class="timer-ring" cx="130" cy="130" fill="none" r="122" stroke="#C64B2A" stroke-dasharray="766" stroke-dashoffset="421" stroke-linecap="round" stroke-width="16"></circle>
</svg>
<!-- Center Content -->
<div class="absolute flex flex-col items-center text-center">
<p class="font-label-11 text-label-11 text-on-surface-variant opacity-60 mb-1">断食中 · 已过 7h 12m</p>
<h2 class="text-[68px] font-semibold tabular-nums text-on-surface tracking-tighter leading-none">08:48</h2>
<p class="font-caption-13 text-caption-13 text-on-surface-variant opacity-60 mt-1">剩余</p>
</div>
</div>
<!-- Time Info -->
<div class="mt-lg text-center">

<script>
        // Simple micro-interaction for water button
        const waterBtn = document.querySelector('button:contains("记录一杯水")');
        if (waterBtn) {
            waterBtn.addEventListener('click', () => {
                const toast = document.createElement('div');
                toast.className = 'fixed bottom-24 left-1/2 -translate-x-1/2 bg-on-background text-background px-lg py-sm rounded-full font-label-11 shadow-xl z-[100] transition-opacity duration-300';
                toast.textContent = '💧 已记录 250ml 水分';
                document.body.appendChild(toast);
                setTimeout(() => {
                    toast.style.opacity = '0';
                    setTimeout(() => toast.remove(), 300);
                }, 2000);
            });
        }

        // Custom selector polyfill for the demo
        document.querySelectorAll('button').forEach(btn => {
            if (btn.textContent.includes('记录一杯水')) {
                btn.onclick = () => {
                   const toast = document.createElement('div');
                    toast.className = 'fixed bottom-24 left-1/2 -translate-x-1/2 bg-on-background text-background px-lg py-sm rounded-full font-label-11 shadow-xl z-[100] fade-in';
                    toast.textContent = '💧 已记录 250ml 水分';
                    document.body.appendChild(toast);
                    setTimeout(() => {
                        toast.classList.add('opacity-0');
                        setTimeout(() => toast.remove(), 300);
                    }, 2000);
                }
            }
        });
    </script>
