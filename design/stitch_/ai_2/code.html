</div>
<div>
<h1 class="font-title-28 text-title-28 text-on-surface !text-lg leading-tight">小千</h1>
<p class="font-caption-13 text-caption-13 text-on-surface-variant flex items-center gap-1">
<span class="w-2 h-2 bg-secondary rounded-full inline-block"></span> 温柔知心
                </p>
</div>
</div>
<button class="w-10 h-10 flex items-center justify-center text-primary dark:text-primary-fixed hover:opacity-80 active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</header>
<!-- Chat Canvas -->
<main class="flex-1 overflow-y-auto px-margin-mobile pt-20 pb-32 space-y-lg flex flex-col">
<!-- Date Marker -->
<div class="flex justify-center my-4">
<span class="font-caption-13 text-caption-13 text-on-surface-variant px-3 py-1 bg-surface-container rounded-full">今天 12:30</span>
</div>
<!-- AI Message -->
<div class="flex items-start gap-3 max-w-[85%] self-start">
<div class="flex flex-col gap-1">
<div class="message-bubble-ai bg-white rounded-2xl rounded-tl-none p-md">
<p class="font-body-17 text-body-17">你好呀！我是你的健康搭子小千。今天想记录点什么？</p>
</div>
</div>
</div>
<!-- User Message -->
<div class="flex items-start gap-3 max-w-[85%] self-end">
<div class="flex flex-col gap-1">
<div class="message-bubble-user rounded-2xl rounded-tr-none p-md">
<p class="font-body-17 text-body-17">我刚才吃了一碗兰州拉面，能帮我算算热量吗？</p>
</div>
</div>
</div>
<!-- AI Response -->
<div class="flex items-start gap-3 max-w-[85%] self-start">
<div class="flex flex-col gap-4 w-full">
<div class="message-bubble-ai bg-white rounded-2xl rounded-tl-none p-md">
<p class="font-body-17 text-body-17">好的，我来帮你估算：</p>
</div>
<!-- Food Log Card (Asymmetric Bento Style) -->
<div class="bg-white rounded-xl shadow-soft border border-outline-variant overflow-hidden flex flex-col w-full max-w-sm">
<div class="p-md bg-surface-container-low border-b border-outline-variant flex justify-between items-center">
<span class="font-section-22 text-section-22 !text-base">兰州拉面 (标准碗)</span>
<span class="font-title-28 text-title-28 !text-xl text-primary">~520 <small class="text-xs">kcal</small></span>
</div>
<div class="p-md space-y-md">

<div class="space-y-xs">
<div class="flex justify-between text-xs text-on-surface-variant">

<span>蛋白质 (18g)</span>
<span>脂肪 (15g)</span>
</div>

<div class="bg-secondary h-full" style="width: 25%"></div>
<div class="bg-tertiary h-full" style="width: 15%"></div>
</div>
</div>

<div class="grid grid-cols-2 gap-2">
<div class="p-xs bg-surface-container-lowest rounded-lg border border-outline-variant/30">
<p class="text-[10px] uppercase tracking-wider text-on-surface-variant">面条量</p>
<p class="font-bold text-sm">约 200g</p>
</div>
<div class="p-xs bg-surface-container-lowest rounded-lg border border-outline-variant/30">
<p class="text-[10px] uppercase tracking-wider text-on-surface-variant">配菜</p>
<p class="font-bold text-sm">牛肉、香菜、萝卜</p>
</div>
</div>
</div>

<button class="flex-1 py-2 rounded-lg border-1.5 border-primary text-primary font-bold text-sm active:scale-95 transition-all flex items-center justify-center gap-1">
<span class="material-symbols-outlined !text-sm" data-icon="edit">edit</span> 编辑
                        </button>
<button class="flex-1 py-2 rounded-lg bg-primary text-white font-bold text-sm active:scale-95 transition-all flex items-center justify-center gap-1 shadow-sm">
<span class="material-symbols-outlined !text-sm" data-icon="check">check</span> 记下
                        </button>
</div>
</div>
</div>
</div>

</button>
</div>

<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-label-11 text-label-11">首页</span>
</a>

<span class="material-symbols-outlined" data-icon="edit_note">edit_note</span>
<span class="font-label-11 text-label-11">记录</span>
</a>

<span class="material-symbols-outlined !text-3xl" data-icon="add">add</span>
</div>
</div>

<a class="flex flex-col items-center gap-1 py-2 flex-1 text-primary dark:text-primary-fixed font-bold hover:bg-surface-container-low transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="smart_toy" style="font-variation-settings: 'FILL' 1;">smart_toy</span>

<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label-11 text-label-11">我的</span>
