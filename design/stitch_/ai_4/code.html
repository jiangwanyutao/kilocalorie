<style>
        body {
            background-color: #17140F; /* Warm Dark Base */
            color: #EFECE4; /* Ivory Paper Text */
            -webkit-tap-highlight-color: transparent;
        }
        .chat-bubble-ai {

            box-shadow: 0 4px 12px 0 rgba(29, 25, 23, 0.08);

        .chat-bubble-user {

        }
        .food-card {
            background-color: #201C16;
            border: 1px solid rgba(239, 236, 228, 0.08);
            border-radius: 14px;
        }
        .memory-card {
            background-color: #2A211A;
            border-left: 3px solid #E86A44;
            border-radius: 4px 14px 14px 4px;
        }
        .glass-top {
            background-color: rgba(23, 20, 15, 0.85);
            backdrop-filter: blur(12px);
        }
        .input-bar {
            background-color: #2A2620;
            border: 1px solid rgba(239, 236, 228, 0.05);
        }
        .soy-orange { color: #E86A44; }

<body class="font-body-17 text-body-17 overflow-hidden h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="glass-top h-[54px] flex items-center justify-between px-margin-mobile flex-shrink-0 z-50">
<div class="flex items-center gap-sm">
<button class="active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[24px]">arrow_back_ios</span>
</button>
</div>
<div class="flex flex-col items-center">
<div class="flex items-center gap-xs">
<div class="w-7 h-7 rounded-full overflow-hidden bg-surface-container">
<img class="w-full h-full object-cover" data-alt="A professional close-up digital portrait of a friendly AI character with soft, glowing orange features and a calm expression. The background is a warm, dark brown, consistent with a high-end personal health diary aesthetic. The character exudes wisdom and empathy, rendered in a clean, minimalist 3D style." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB2pqekF27JJbSCnIqZ0M_mhtdU-NvTIwLZx-T2YtZwV1SD96BluD4kVKqDEKGySa8if5GS8aPd3IEMxMJWqlauitxNrz0LuIWHk428chte-E2fiQJZ7Vbh2or_2_jyAsmfzL13f7TBZwhqsO2vax7rX_hVzMSN1_3iam1WoZManj_VK66opubm3wjo2BjKSDYBZ5H9OS4D9HaPJMTE21zC_zsvyhHy9fXSZZ75Y7YVghriatP33yc7s2hX4J_1o22zmxz9DtLjyjhc"/>
</div>
<span class="font-section-22 text-[17px] leading-tight">小卡</span>
<span class="bg-primary-container/20 text-[#E86A44] font-label-11 text-[10px] px-2 py-0.5 rounded-full border border-[#E86A44]/30">温柔知心</span>
</div>
</div>
<button class="active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[24px]">more_horiz</span>
</button>
</header>
<!-- Chat Message List -->
<main class="flex-1 overflow-y-auto px-margin-mobile py-lg space-y-lg flex flex-col custom-scrollbar">
<!-- AI Greeting -->
<div class="flex items-start gap-sm animate-fade-in">
<div class="w-8 h-8 rounded-full flex-shrink-0 bg-surface-container overflow-hidden mt-1">
<img class="w-full h-full object-cover" data-alt="A detailed, empathetic digital avatar for a health AI companion, featuring subtle warm highlights and a minimalist, organic design. Set against a dark, warm background, the character represents care and intelligence. The visual style is editorial and clean, fitting a premium journaling app." src="https://lh3.googleusercontent.com/aida-public/AB6AXuArON6iEUxKWywtccT3956ftSQCQUCj0daoFF4iTReeN600Vzgc1kXJu4Cupq_BkMZKsGh04AT4rbIJR1cvZNuOjdxI663o_lby7HvlCRbN6jrFYhcgcPMNmk9P7-bsT84aLxIuY2-zAsfwM0f_WS8itFjwxZhb4N7Pq_UffGJ-JxFC00B300RVE7lvSfhpJ9w4GLJvfhNGJRQJYQjb-WgxuN8SANy0KPhp91UAKrGhzTNqffWNNIvyxXu_W7z0x914XLICMVLWXOCj"/>
</div>
<div class="chat-bubble-ai px-md py-sm max-w-[80%]">
<p class="text-[#EFECE4] leading-relaxed">早上好呀！今天想记点什么？</p>
</div>
</div>
<!-- User Input -->
<div class="flex justify-end animate-fade-in delay-100">
<div class="chat-bubble-user px-md py-sm max-w-[80%]">

</div>
</div>
<!-- Food Log Confirmation Card -->

<div class="food-card w-full max-w-[280px] p-md space-y-md">
<div class="flex justify-between items-center border-b border-[#EFECE4]/5 pb-xs">
<span class="font-label-11 text-[#EFECE4]/60 uppercase tracking-widest">午餐识别</span>
<span class="font-section-22 text-soy-orange text-[18px]">485 <span class="text-caption-13 font-normal opacity-70">kcal</span></span>
</div>
<div class="space-y-xs">

<span class="text-[#EFECE4]">番茄炒蛋</span>

</div>

<span class="text-[#EFECE4]">白米饭 (小碗)</span>
<span class="text-[#EFECE4]/60 text-caption-13">170 kcal</span>
</div>
</div>
<div class="flex items-center justify-between pt-xs gap-xs">

<button class="text-caption-13 text-[#EFECE4]/40 hover:text-[#EFECE4]/60 transition-colors">编辑</button>

                        记下 <span class="material-symbols-outlined text-[16px]">arrow_forward</span>

</div>
<div class="chat-bubble-ai px-md py-sm max-w-[80%]">

<!-- Memory Update Card -->
<div class="flex items-start gap-sm animate-fade-in delay-400">

</div>
<p class="text-caption-13 text-[#EFECE4]/80 leading-snug">根据我们之前的交流，我已将你的阶段目标从 <span class="line-through opacity-50">62kg</span> 更新为 <span class="text-[#EFECE4] font-bold">60kg</span>。我们会一起努力的。</p>
</div>
</div>
</main>
<!-- Bottom Composer -->
<footer class="pb-safe pt-sm px-margin-mobile bg-[#17140F] flex-shrink-0">
<div class="input-bar rounded-full flex items-center p-1 pl-md mb-xs">
<input class="bg-transparent border-none focus:ring-0 text-[#EFECE4] placeholder-[#EFECE4]/30 flex-1 py-2 text-body-17" placeholder="聊聊今天的饮食或心情..." type="text"/>
<button class="bg-[#201C16] text-soy-orange w-10 h-10 rounded-full flex items-center justify-center active:scale-90 transition-transform ml-xs">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">send</span>
</button>
</div>
<div class="flex justify-between items-center px-md pb-xs">
<div class="flex gap-lg">
<button class="text-[#EFECE4]/40 flex items-center gap-1 active:opacity-60">
<span class="material-symbols-outlined text-[20px]">photo_library</span>
</button>
<button class="text-[#EFECE4]/40 flex items-center gap-1 active:opacity-60">
<span class="material-symbols-outlined text-[20px]">mic</span>
</button>
<button class="text-[#EFECE4]/40 flex items-center gap-1 active:opacity-60">
<span class="material-symbols-outlined text-[20px]">barcode_reader</span>
</button>
</div>
</div>
</footer>
<script>
        // Simple entry animation handling
        document.addEventListener('DOMContentLoaded', () => {
            const elements = document.querySelectorAll('.animate-fade-in');
            elements.forEach((el, index) => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(10px)';
                el.style.transition = 'all 0.5s ease-out';
                
                setTimeout(() => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }, (index * 150) + 200);
            });
        });
    </script>
</body></html>
