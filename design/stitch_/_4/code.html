<style>
        body {
            background-color: #FAF9F5;
            color: #1F1B19;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .ios-status-bar {
            height: 44px;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 600;
        }
        .home-indicator {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 134px;
            height: 5px;
            background-color: #1F1B19;
            border-radius: 100px;
            opacity: 0.2;
        }
        .active-scale:active {
            transform: scale(0.97);
            transition: transform 0.1s ease;
        }
    </style>

<body class="flex flex-col h-screen font-body-17">
<!-- 1. Status Bar (iOS 17 style) -->
<header class="ios-status-bar fixed top-0 w-full z-50">
<div id="status-time">9:41</div>
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined !text-[18px]">signal_cellular_4_bar</span>
<span class="material-symbols-outlined !text-[18px]">wifi</span>
<span class="material-symbols-outlined !text-[18px]">battery_full</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col px-margin-mobile pt-[44px]">
<!-- 2. Large empty space (30% approx) -->
<div class="h-[30vh]"></div>
<!-- 3. Minimal line-art logo -->
<div class="flex flex-col items-center justify-center text-center">
<div class="w-24 h-24 mb-6 transition-opacity duration-700 animate-in fade-in slide-in-from-bottom-4">
<img alt="千卡日记 logo" class="w-full h-full object-contain" src="https://lh3.googleusercontent.com/aida/AP1WRLsW5el0S9TW2mlNaJWn3WA4HTqaXmbeS-_E_xfiPQwNZriKKfXRQMRTkv17X09IRpjJgmgiYLsEmbA9tUT8p04r0J9ZXDj7knOpcsXK47D3hE8YVjYMglo_1loUDhSrn4anDYqg4NrGY3lBocRd7d8J8IUKH4CMIhVrCnJGMimanyyvD2UKytll7Hpy8zWtusxv14vttWAYNSbP3peKrrGb67LD-VhwBNDIIQJkD3HmQx9GLKDuGVsHruqv"/>
</div>
<!-- 4. App Name -->
<h1 class="font-hero-34 text-hero-34 text-[#1D1917] mb-2">
                千卡日记
            </h1>
<!-- 5. Slogan -->
<p class="font-body-17 text-[#5C5852] text-[15px] opacity-80">
                吃点什么，记一笔
            </p>
</div>
<!-- 6. Spacer -->
<div class="flex-1"></div>
<!-- Footer Actions -->
<div class="pb-xl space-y-md w-full max-w-[600px] mx-auto">
<!-- 7. Primary Button -->
<button class="w-full h-[48px] bg-[#C64B2A] text-white rounded-[10px] font-body-17 active-scale shadow-sm flex items-center justify-center">
                开始记一笔
            </button>
<!-- 8. Login Link -->
<div class="w-full text-center">
<a class="inline-block text-[#C64B2A] font-body-17 active:opacity-60 transition-opacity" href="#">
                    已有账号 · 登录
                </a>
</div>
</div>
<!-- 9. Bottom Safe Area / Home Indicator -->
<div class="h-[34px] relative">
<div class="home-indicator"></div>
</div>
</main>
<script>
        // Update time dynamically to feel live
        function updateTime() {
            const timeEl = document.getElementById('status-time');
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            timeEl.textContent = `${hours}:${minutes}`;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Subtle parallax or fade-in effects can be added here
        document.addEventListener('DOMContentLoaded', () => {
            document.body.classList.add('opacity-0');
            setTimeout(() => {
                document.body.classList.remove('opacity-0');
                document.body.classList.add('transition-opacity', 'duration-1000', 'opacity-100');
            }, 50);
        });
    </script>
</body></html>
