            使用 温柔知心
        </button>

<script>
        function selectPersona(element) {
            // Remove selection from all cards
            document.querySelectorAll('.persona-card').forEach(card => {
                card.classList.remove('border-primary-container');
                card.classList.add('border-transparent');
                
                // Remove check icon if exists
                const existingCheck = card.querySelector('.selected-indicator');
                if (existingCheck) existingCheck.remove();
            });

            // Add selection to clicked card
            element.classList.remove('border-transparent');
            element.classList.add('border-primary-container');

            // Add check icon
            const indicator = document.createElement('div');
            indicator.className = 'selected-indicator absolute top-2 right-2 bg-primary-container text-white rounded-full w-5 h-5 flex items-center justify-center';
            indicator.innerHTML = '<span class="material-symbols-outlined text-[14px]" style="font-variation-settings: \'FILL\' 1;">check</span>';
            element.appendChild(indicator);

            // Update footer button text
            const name = element.querySelector('h3').innerText;
            const btn = document.getElementById('confirm-btn');
            btn.innerText = `使用 ${name}`;
            
            // Subtle haptic feedback feel
            if (window.navigator.vibrate) {
                window.navigator.vibrate(10);
            }
        }
    </script>
