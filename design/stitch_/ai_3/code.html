<body class="bg-background flex flex-col min-h-screen">

<div class="flex items-center gap-xs">
<div class="w-8 h-8 rounded-full overflow-hidden border border-outline-variant">

</div>
<div class="flex flex-col">

<span class="bg-secondary-container text-on-secondary-container px-xs rounded-full font-label-11 text-[10px]">温柔知心</span>
</div>
</div>
</div>
<button aria-label="更多操作" class="flex items-center justify-center active:scale-95 transition-transform">
<span class="material-symbols-outlined text-on-surface">more_horiz</span>
</button>
</header>
<!-- Chat Content -->
<main class="chat-container flex-1 overflow-y-auto px-margin-mobile pt-lg pb-xl space-y-lg">
<!-- AI Greeting -->
<div class="flex items-start gap-xs max-w-[85%]">
<div class="w-6 h-6 rounded-full overflow-hidden flex-shrink-0 mt-xs border border-outline-variant">
<img class="w-full h-full object-cover" data-alt="A small circular avatar icon representing a gentle AI companion. The character is depicted in a soft, modern watercolor style with a warm, empathetic facial expression and subtle orange-hued hair. The overall vibe is calm and supportive, fitting for a personal health diary application." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBAkhj9RGa-f7rlH5CzMh2qwqXNRfc2SnQue_mbcewNFfq5WFUf2Vn5lhkCc3BYNea62XchTbwNgzInhBVLJrbPpqjSxLxL7PHbz9NaOGjnakEwaoD3fPGJ_SgEyrf7mKf9BxSmc-RR0q5HQ4yQ3hjL2mAJk-36gQjl8oiydRvz8Mj4HZg8EDZ1uzp-kvi739iz4ncQ0qFVe5enhf_1QQGlnphbBRQZLB3IKff_yeckUxZBh79AwhijJGbHojsPN3Y6mHhGCa2EpQ8Q"/>
</div>
<div class="space-y-base">
<div class="bg-surface-container-lowest border border-[#E3E0D6] rounded-[14px] px-md py-sm shadow-sm">
<p class="font-body-17 text-on-surface text-[15px]">早上好呀！今天想记点什么？</p>
</div>
<p class="font-label-11 text-on-surface-variant opacity-60 ml-xs">07:12</p>
</div>
</div>
<!-- User Message -->
<div class="flex justify-end w-full">
<div class="bg-[#F0E4D5] rounded-[14px] px-md py-sm max-w-[80%] shadow-sm">
<p class="font-body-17 text-on-surface text-[15px]">我中午吃了一份番茄炒蛋和一碗米饭</p>
</div>
</div>
<!-- Food Log Confirmation Card -->
<div class="flex items-start gap-xs w-[92%]">
<div class="w-6 h-6 rounded-full flex-shrink-0"></div> <!-- Spacer for alignment -->
<div class="bg-surface-container-lowest border border-[#E3E0D6] rounded-[14px] w-full shadow-sm overflow-hidden">
<div class="p-md space-y-md">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-primary text-[20px]">restaurant</span>
<h3 class="font-body-17 font-bold text-[15px]">帮你记入午餐？</h3>
</div>
<div class="space-y-xs">
<div class="flex justify-between items-center text-[14px]">
<span class="text-on-surface">番茄炒蛋 · 1份</span>
<span class="tabular-nums text-on-surface-variant">~120 kcal</span>
</div>
<div class="flex justify-between items-center text-[14px]">
<span class="text-on-surface">米饭 · 1碗 · 200g</span>
<span class="tabular-nums text-on-surface-variant">~232 kcal</span>
</div>
</div>
<div class="pt-sm border-t border-outline-variant flex justify-between items-center">
<span class="font-body-17 font-bold">合计</span>
<span class="tabular-nums font-section-22 text-primary text-[20px]">352 kcal</span>
</div>
<div class="flex gap-sm pt-xs">
<button class="flex-1 py-xs border border-outline-variant text-on-surface-variant font-label-11 rounded-lg hover:bg-surface-container-low transition-colors">编辑</button>
<button class="flex-1 py-xs text-on-surface-variant font-label-11 hover:bg-surface-container-low rounded-lg transition-colors">先不了</button>
<button class="flex-[1.5] py-xs bg-primary-container text-on-primary-container font-label-11 rounded-lg flex items-center justify-center gap-xs active:scale-[0.98] transition-transform">
                            记下 <span class="material-symbols-outlined text-[14px]">arrow_forward</span>
</button>
</div>
</div>
</div>
</div>
<!-- AI Follow-up -->
<div class="flex items-start gap-xs max-w-[85%]">
<div class="w-6 h-6 rounded-full overflow-hidden flex-shrink-0 mt-xs border border-outline-variant">
<img class="w-full h-full object-cover" data-alt="A small avatar of the AI character 小卡, shown with a peaceful and helpful expression. The art style is minimalist with a tactile, paper-like texture. The color palette emphasizes warm ivories and soft soy orange, creating a non-judgmental and encouraging atmosphere for the user." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDiKpwrW__5XR_L2YbTjemP0EisiPghTWo3B2esuDpNX5weuf8GnP5_JYd4WlKfGWMyC8CJTpb3MOL_rNpYbFSqQUBgmoYfAYhdCryLz0ebM8MWtWCeMw0t3Ho8yWyFoP6qHQzLZuXw5Kpb7rj-33WS1zok5o88jekYK_JFCETk0AO_n-AZDxPdB7YkEUTngJaRUBi4Pe90cR09nxC6XOSQ5GcIyNaIpOdHprg6L72rutBP_IsGjDcQRczn7nVY7u_QOMMFubH5RbG-"/>
</div>
<div class="bg-surface-container-lowest border border-[#E3E0D6] rounded-[14px] px-md py-sm shadow-sm">
<p class="font-body-17 text-on-surface text-[15px]">记好了。今天还剩 500 kcal，晚餐可以吃个轻的~</p>
</div>
</div>
<!-- Memory Update Card -->
<div class="flex items-start gap-xs w-[85%]">
<div class="w-6 h-6 rounded-full flex-shrink-0"></div>
<div class="bg-[#F0E4D5] border-l-[3px] border-primary-container rounded-[14px] w-full shadow-sm p-md space-y-sm">
<div class="flex items-center">
<span class="bg-primary-container text-on-primary-container px-xs py-[2px] rounded-full font-label-11 text-[10px]">记忆更新</span>
</div>
<div class="space-y-xs">
<div class="flex items-center gap-md">
<span class="text-[12px] text-on-surface-variant w-4">旧</span>
<span class="text-on-surface-variant line-through text-[14px]">目标体重 62 kg</span>
</div>
<div class="flex items-center gap-md">
<span class="text-[12px] font-bold w-4">新</span>
<span class="font-bold text-[14px]">目标体重 60 kg</span>
</div>
<p class="text-[12px] text-on-surface-variant italic mt-xs">“你刚才说想再瘦点”</p>
</div>
<div class="flex gap-sm pt-sm">
<button class="flex-1 py-xs border border-outline text-on-surface-variant font-label-11 rounded-lg">拒绝</button>
<button class="flex-1 py-xs text-on-surface-variant font-label-11">编辑再确认</button>
<button class="flex-1 py-xs bg-primary-container text-on-primary-container font-label-11 rounded-lg active:scale-95 transition-transform">确认</button>
</div>
</div>
</div>
</main>
<!-- Bottom Composer Bar -->
<footer class="bg-background pb-safe px-margin-mobile pt-sm h-auto flex flex-col gap-sm border-t border-transparent">
<div class="flex items-center gap-md mb-xs">
<div class="flex-1 flex items-center bg-surface-container-low rounded-xl px-md py-sm border border-outline-variant/30">
<input class="bg-transparent border-none focus:ring-0 w-full text-[15px] font-body-17 placeholder:text-on-surface-variant/40" placeholder="跟我聊聊今天…" type="text"/>
</div>
<button class="w-10 h-10 bg-primary-container rounded-full flex items-center justify-center text-on-primary-container active:scale-90 transition-all shadow-md">
<span class="material-symbols-outlined">send</span>
</button>
</div>
<div class="flex items-center gap-lg pb-sm px-xs">
<button class="flex items-center gap-xs text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[22px]">image</span>
</button>
<button class="flex items-center gap-xs text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[22px]">mic</span>
</button>
</div>
</footer>
<script>
        // Micro-interaction for input focus
        const input = document.querySelector('input');
        const footer = document.querySelector('footer');
        
        input.addEventListener('focus', () => {
            footer.classList.add('shadow-[0_-4px_20px_0_rgba(29,25,23,0.06)]');
        });
        
        input.addEventListener('blur', () => {
            footer.classList.remove('shadow-[0_-4px_20px_0_rgba(29,25,23,0.06)]');
        });

        // Simple bounce animation for buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                btn.classList.add('scale-95');
                setTimeout(() => btn.classList.remove('scale-95'), 100);
            });
        });
    </script>
