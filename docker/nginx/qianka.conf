# 千卡日记 · Nginx 反向代理（内网 http 版）
# 外网 TLS 与域名在 frps/域名反代层做 · 这里只需 http

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # 通用安全 header · X-Frame 允许 same-origin（frp 前面可能再套一层）
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml application/wasm image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # Apple Health XML zip 可到 100MB · 拍照 base64 上限 22MB
    client_max_body_size 150m;
    client_body_timeout 120s;

    # SSE 专用（AI 流式对话）· 关缓冲 · 长超时 · 优先匹配
    location ~ ^/api/ai/conversations/[^/]+/message-stream$ {
        proxy_pass http://api:7100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        # SSE 特殊
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        chunked_transfer_encoding on;
    }

    location /api/ {
        proxy_pass http://api:7100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # 反代健康检查（compose 里 nginx healthcheck 用）
    location = /health {
        proxy_pass http://api:7100/api/health;
        proxy_set_header Host $host;
    }

    # 前端静态资源 · 长缓存
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|svg|webp|avif|ico)$ {
        proxy_pass http://web:80;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # PWA 不缓存的 3 个文件
    location ~* /(sw\.js|manifest\.webmanifest|registerSW\.js)$ {
        proxy_pass http://web:80;
        add_header Cache-Control "no-cache";
    }

    # SPA fallback · 其余全转 web 容器
    location / {
        proxy_pass http://web:80;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
