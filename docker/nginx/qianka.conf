# 千卡日记 · Nginx 极简 SPA + API 反代
# 缓存策略：
#   · index.html + sw.js + manifest：no-cache（每次到源 · 拿最新 hash 引用）
#   · /assets/*（vite hash 命名 · immutable）：1 年长缓存
#   · SPA fallback：其他路径 → /
#   · /api/：反代到 api 容器

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml application/wasm image/svg+xml application/manifest+json;
    gzip_min_length 1024;
    gzip_vary on;

    # Apple Health XML zip 可到 100MB
    client_max_body_size 150m;
    client_body_timeout 120s;

    # ─── API 反代 ───────────────────────────
    location ~ ^/api/ai/conversations/[^/]+/message-stream$ {
        proxy_pass http://api:7100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        chunked_transfer_encoding on;
    }

    location /api/ {
        proxy_pass http://api:7100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    location = /health {
        proxy_pass http://api:7100/api/health;
        proxy_set_header Host $host;
    }

    # ─── 静态资源 ───────────────────────────
    # /assets/* · vite hash 命名 · 内容不可变 · 长缓存
    location /assets/ {
        proxy_pass http://web:80;
        proxy_hide_header Cache-Control;
        proxy_hide_header Expires;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ~* ^/(sw\.js|manifest\.webmanifest|favicon\.svg)$ {
        proxy_pass http://web:80;
        proxy_hide_header Cache-Control;
        proxy_hide_header Expires;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires -1;
    }

    location /icons/ {
        proxy_pass http://web:80;
        proxy_hide_header Cache-Control;
        proxy_hide_header Expires;
        add_header Cache-Control "public, max-age=604800" always;
    }

    location / {
        proxy_pass http://web:80;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Cache-Control;
        proxy_hide_header Expires;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires -1;
    }
}
